name: barangay_app
description: "Barangay Service Request System"

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private projects.
publish_to: 'none'

# Application version and build number.
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

# Dependencies specify other packages that your application needs
# in order to work.
dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5


  # Cupertino Icons for iOS style icons
  cupertino_icons: ^1.0.8

  # HTTP requests for API communication
  http: ^1.6.0

  # State management
  provider: ^6.1.5

  # Local storage
  shared_preferences: ^2.5.5

  # Date and time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint rules for Flutter projects
  flutter_lints: ^4.0.0

# Flutter-specific settings
flutter:

  # Ensures that Material Icons are included
  uses-material-design: true

  # To add assets to your application, uncomment below:
  assets:
    - assets/images/

  # To add custom fonts, uncomment below:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf